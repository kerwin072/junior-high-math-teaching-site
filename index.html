<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="國中數學教材網站：以清楚的概念、練習與探索活動陪伴學習。"
    />
    <title>國中數學教材網站</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top">數學探索站</a>
      <nav aria-label="主要導覽">
        <a href="#topics">學習主題</a>
        <a href="#start">開始學習</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <p class="eyebrow">JUNIOR HIGH MATH</p>
        <h1 id="hero-title">把數學的每一步，<br />變成看得懂的發現。</h1>
        <p>
          從概念說明、例題練習到小挑戰，逐步建立國中數學的理解與信心。
        </p>
        <a class="button" href="#topics">探索學習主題</a>
      </section>

      <section id="topics" class="topics" aria-labelledby="topics-title">
        <div class="section-heading">
          <p class="eyebrow">LEARNING PATHS</p>
          <h2 id="topics-title">學習主題</h2>
        </div>
        <div class="topic-grid">
          <article>
            <span>01</span>
            <h3>數與代數</h3>
            <p>從整數、分數到方程式，建立運算與表徵的基礎。</p>
          </article>
          <article>
            <span>02</span>
            <h3>幾何與測量</h3>
            <p>用圖形、推理與實作，理解平面與立體世界。</p>
          </article>
          <article>
            <span>03</span>
            <h3>資料與機率</h3>
            <p>從資料圖表出發，練習分析、判讀與做出合理推論。</p>
          </article>
        </div>
      </section>

      <section id="start" class="start" aria-labelledby="start-title">
        <h2 id="start-title">網站已準備好，接著加入第一份教材。</h2>
        <p>建議先從一個年級、一個單元開始，逐步累積內容。</p>
      </section>
    </main>

    <footer>國中數學教材網站 · 持續建置中</footer>
  </body>
</html>
